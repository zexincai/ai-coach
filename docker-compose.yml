services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zenith}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zenith_secret}
      POSTGRES_DB: ${POSTGRES_DB:-zenith_planner}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://zenith:zenith_secret@db:5432/zenith_planner}
      JWT_SECRET: ${JWT_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  pgdata:
